<!DOCTYPE html>

<html lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>CyberWise - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&amp;family=Nunito+Sans:wght@300;400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background: linear-gradient(135deg, #d4e6e5 0%, #ecdeee 100%);
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
        }
        .input-focus-effect:focus-within {
            border-color: #000666;
            box-shadow: 0 0 0 1px #000666;
        }
        .button-press:active {
            transform: scale(0.98);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-surface-variant": "#454652",
                        "surface-container": "#eeeeed",
                        "on-error": "#ffffff",
                        "tertiary": "#201823",
                        "on-secondary-fixed": "#0e1e1e",
                        "on-primary-container": "#8690ee",
                        "secondary-container": "#d4e6e5",
                        "on-background": "#1a1c1c",
                        "outline-variant": "#c6c5d4",
                        "on-tertiary": "#ffffff",
                        "inverse-on-surface": "#f1f0f0",
                        "secondary-fixed-dim": "#b8cac9",
                        "background": "#faf9f8",
                        "on-primary-fixed": "#000767",
                        "primary-fixed-dim": "#bdc2ff",
                        "on-tertiary-container": "#9f94a2",
                        "on-primary": "#ffffff",
                        "on-surface": "#1a1c1c",
                        "outline": "#767683",
                        "on-secondary-container": "#576867",
                        "tertiary-fixed-dim": "#cfc2d2",
                        "surface-container-high": "#e9e8e7",
                        "on-secondary-fixed-variant": "#3a4a49",
                        "tertiary-fixed": "#ecdeee",
                        "on-tertiary-fixed": "#201924",
                        "error": "#ba1a1a",
                        "surface-variant": "#e3e2e1",
                        "surface-bright": "#faf9f8",
                        "inverse-primary": "#bdc2ff",
                        "surface-container-low": "#f4f3f2",
                        "secondary-fixed": "#d4e6e5",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-fixed-variant": "#4d4450",
                        "inverse-surface": "#2f3130",
                        "tertiary-container": "#352d39",
                        "primary-fixed": "#e0e0ff",
                        "primary": "#000666",
                        "on-primary-fixed-variant": "#343d96",
                        "on-secondary": "#ffffff",
                        "secondary": "#516161",
                        "on-error-container": "#93000a",
                        "surface-tint": "#4c56af",
                        "surface-container-highest": "#e3e2e1",
                        "primary-container": "#1a237e",
                        "error-container": "#ffdad6",
                        "surface": "#faf9f8",
                        "surface-dim": "#dadad9"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "base": "8px",
                        "stack-sm": "12px",
                        "stack-md": "24px",
                        "stack-lg": "48px",
                        "container-padding-mobile": "20px",
                        "container-padding-desktop": "40px",
                        "gutter": "16px"
                    },
                    "fontFamily": {
                        "headline-md": ["Quicksand"],
                        "headline-lg-mobile": ["Quicksand"],
                        "headline-lg": ["Quicksand"],
                        "label-md": ["Quicksand"],

                        "body-lg": ["Nunito Sans"],
                        "button": ["Quicksand"]

                    "fontSize": {

                        "headline-lg-mobile": ["26px", {"lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],

                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],

                },
            },
        }

<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex items-center justify-center p-container-padding-mobile md:p-container-padding-desktop">
<main class="w-full max-w-[480px]">
<div class="glass-card rounded-lg p-8 md:p-10 shadow-[0px_8px_24px_rgba(0,6,102,0.04)] relative overflow-hidden">
<!-- Decorative Element -->
<div class="absolute -top-12 -right-12 w-32 h-32 bg-secondary-fixed rounded-full opacity-20 blur-3xl"></div>
<div class="absolute -bottom-12 -left-12 w-32 h-32 bg-primary-fixed-dim rounded-full opacity-20 blur-3xl"></div>
<div class="relative z-10 flex flex-col items-center">
<!-- Brand Identity -->
<div class="flex items-center gap-2 mb-stack-sm">
<span class="material-symbols-outlined text-primary text-[40px]" data-icon="security" style="font-variation-settings: 'FILL' 1;">security</span>
<h1 class="font-headline-md text-headline-md text-primary font-bold">CyberWise</h1>
</div>
<h2 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-primary text-center mb-stack-md leading-tight">
                    Protect Your Digital Journey
                </h2>
<!-- Login Form -->
<form class="w-full space-y-stack-sm" onsubmit="event.preventDefault();">
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant ml-2" for="username">Username</label>
<div class="flex items-center bg-surface-container-lowest border border-outline-variant rounded-full px-5 py-3 transition-all input-focus-effect">
<span class="material-symbols-outlined text-outline mr-3" data-icon="person">person</span>
<input class="bg-transparent border-none outline-none w-full font-body-md text-body-md text-on-surface focus:ring-0" id="username" placeholder="Enter your username" type="text"/>
</div>
</div>
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant ml-2" for="password">Password</label>
<div class="flex items-center bg-surface-container-lowest border border-outline-variant rounded-full px-5 py-3 transition-all input-focus-effect">
<span class="material-symbols-outlined text-outline mr-3" data-icon="lock">lock</span>
<input class="bg-transparent border-none outline-none w-full font-body-md text-body-md text-on-surface focus:ring-0" id="password" placeholder="••••••••" type="password"/>
<button class="text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<div class="flex justify-end pt-1 pb-stack-md">
<a class="font-label-md text-label-md text-on-primary-fixed-variant hover:underline" href="#">Forgot password?</a>
</div>
<!-- Action Buttons -->
<div class="space-y-gutter">
<button class="w-full bg-primary text-on-primary font-button text-button py-4 rounded-full shadow-md hover:opacity-90 transition-all button-press flex items-center justify-center gap-2">
<span>Masuk sebagai Siswa</span>
<span class="material-symbols-outlined" data-icon="school">school</span>
</button>
<button class="w-full bg-transparent border-2 border-secondary-fixed-dim text-secondary font-button text-button py-4 rounded-full hover:bg-secondary-container transition-all button-press flex items-center justify-center gap-2">
<span>Masuk sebagai Guru</span>
<span class="material-symbols-outlined" data-icon="supervisor_account">supervisor_account</span>
</button>
</div>
</form>
<div class="mt-stack-lg flex flex-col items-center">
<p class="font-body-md text-body-md text-on-surface-variant mb-gutter">New to CyberWise?</p>
<button class="font-button text-button text-primary border-b-2 border-primary-fixed-dim hover:border-primary transition-all">Create an account</button>
</div>
</div>
</div>
<!-- Illustrative Element (Hidden on small screens) -->
<div class="hidden md:block mt-stack-md text-center">
<div class="inline-flex items-center gap-3 px-6 py-3 bg-white/40 backdrop-blur-sm rounded-full border border-white/50">
<span class="flex h-3 w-3 relative">
<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-primary opacity-75"></span>
<span class="relative inline-flex rounded-full h-3 w-3 bg-primary"></span>
</span>
<span class="font-label-md text-label-md text-primary uppercase tracking-widest">Secure Login Active</span>
</div>
</div>
</main>
<script>
      <script src="script.js">
    </script>
</body></html>
